# Fly.io config for the RESTYLE preview app (community-jup design language).
# Deploy with:  flyctl deploy --config fly.restyle.toml --app wc2026-restyle
#
# Differences vs staging:
#   - separate app (wc2026-restyle) — prod and wc2026-staging are never touched
#   - NO persistent volume: the SQLite DB lives in the container's writable layer
#     (db.js mkdir's the dir on boot; matches re-seed from the football API).
#     Data resets on each deploy — fine for a visual preview.

app = "wc2026-restyle"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  DB_PATH = "/data/wc2026.db"
  FOOTBALL_COMPETITION_CODE = "WC"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1
