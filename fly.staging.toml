# Fly.io config for the STAGING copy of the predictor app.
# Deploy with:  flyctl deploy --config fly.staging.toml --app wc2026-staging
#
# Differences vs production (fly.toml / app wc2026-zfovlq):
#   - separate app name (wc2026-staging) so jup26wc.com is never touched
#   - NO persistent volume — the SQLite DB lives in the container's writable
#     layer (db.js mkdir's the dir on boot). Data resets on each deploy, which
#     is fine for a visual preview and avoids paying for a volume.

app = "wc2026-staging"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  DB_PATH = "/data/wc2026.db"
  FOOTBALL_COMPETITION_CODE = "WC"
  SOLANA_RPC_URL = "https://api.mainnet-beta.solana.com"

# Persistent SQLite so test data survives deploys.
[[mounts]]
  source = "wc26stg"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1
