<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WC 2026 Bracket Pool</title>
    <meta name="description" content="A community-run World Cup 2026 bracket pool: build your bracket, predict every match, and climb the leaderboard for a share of the prize pool." />
    <meta name="theme-color" content="#0C0C0C" />

    <link rel="icon" href="/favicon-2.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32-2.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16-2.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-2.png" />

    <!-- Open Graph (Twitter / iMessage / Slack / Discord link previews).
         Description states the mechanic + that this is community-run, so previews
         self-disambiguate from Jupiter's official products. -->
    <meta property="og:site_name" content="Jupiter Community Predictor Challenge" />
    <meta property="og:title" content="WC 2026 Bracket Pool" />
    <meta property="og:description" content="A community-run World Cup 2026 bracket pool: build your bracket, predict every match, and climb the leaderboard for a share of the prize pool." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://jup26wc.com" />
    <meta property="og:image" content="https://jup26wc.com/og-image.png?v=3" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="WC 2026 Bracket Pool, a community-run World Cup prediction challenge" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="WC 2026 Bracket Pool" />
    <meta name="twitter:description" content="A community-run World Cup 2026 bracket pool: build your bracket, predict every match, and climb the leaderboard for a share of the prize pool." />
    <meta name="twitter:image" content="https://jup26wc.com/og-image.png?v=3" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Inter incl. REAL italics (ital axis) — the match banners are italic-heavy and
         synthetic (faux) oblique renders distorted and clips unpredictably. -->
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,600;1,700;1,800;1,900&display=swap" />
  </head>
  <body class="bg-space text-cloud">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
