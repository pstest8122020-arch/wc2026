# fly.toml app configuration file generated for wc2026-zfovlq on 2026-05-25T16:18:52Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'wc2026-zfovlq'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  DB_PATH = '/data/wc2026.db'
  FOOTBALL_COMPETITION_CODE = 'WC'
  NODE_ENV = 'production'
  PORT = '3001'
  SOLANA_RPC_URL = 'https://api.mainnet-beta.solana.com'

[[mounts]]
  source = 'wc26data'
  destination = '/data'
  initial_size = '1gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
