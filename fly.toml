# Fly.io app config for Jupiter Community Predictor Challenge
# App name is global — change `app` if "jupiter-wc26-predictor" is taken.

app = "jupiter-wc26-predictor"
primary_region = "iad"   # US East (Ashburn). Change to "fra" / "ams" for EU.

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3001"
  DB_PATH = "/data/wc2026.db"
  FOOTBALL_COMPETITION_CODE = "WC"
  SOLANA_RPC_URL = "https://api.mainnet-beta.solana.com"

# Persistent storage for the SQLite file
[[mounts]]
  source = "wc26data"
  destination = "/data"
  initial_size = "1gb"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "off"      # keep running so the 60s poll job works
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/api/health"

# Smallest VM that comfortably runs Node + a sync job
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1
